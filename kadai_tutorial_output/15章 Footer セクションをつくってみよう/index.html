<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAMURAI KITCHEN</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- フッター開始 -->
  <footer id="footer">
    <div class="container">
      <div class="row">
        <div class="col-12 col-lg-6 position-relative">
          <div class="row pt-5">
            <div class="col-lg-2 text-center my-3">
              <img class="img-fluid footer_brand_logo" src="img/site_logo.png" alt="サンプル画像">
            </div>
            <div class="col-lg-10 align-self-center my-3">
              <h2 class="m-0 footer_text">SAMURAI RESTAURANT</h2>
            </div>
          </div>

          <div class="restaurant_info py-3">
            <div class="d-flex mb-3">
              <img src="img/icon-Marker.png" alt="marker">
              <p class="p-0 m-0">東京都渋谷区道玄坂2丁目11-1Gスクエア渋谷道玄坂4F</p>
            </div>
            <div class="d-flex mb-3">
              <img src="img/icon-Clock.png" alt="clock">
              <p class="p-0 m-0">12:00-22:00&nbsp;&nbsp;(定休日：火曜日、水曜日)</p>
            </div>
            <div class="d-flex mb-3">
              <img src="img/icon-Phone.png" alt="phone">
              <p class="p-0 m-0">03-1234-5678</p>
            </div>
            <div class="d-flex mb-3">
              <img src="img/icon-Mail.png" alt="mail">
              <p class="p-0 m-0">test@example.com</p>
            </div>
          </div>

          <div class="copy_right align-items-center">
            <p>
              ©SAMURAI KITCHEN, All Rights Reserved.
            </p>
            <img src="img/icon-facebook.png" class="sns_img" alt="facebook">
            <img src="img/icon-twitter.png" class="sns_img" alt="twitter">
          </div>
        </div>

        <div class="col-12 col-lg-6 d-none d-lg-block">
          <img src="img/background-footer.jpg" class="img-fluid" alt="背景画像">
        </div>
      </div>
    </div>
  </footer>
  <!-- フッター終了 -->

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
